<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NHM Rajasthan — Bill Pendency Dashboard</title>
<style>
:root{
  --saffron:#e87722; --navy:#1b3a6b; --navy2:#274d8c; --bg:#eef2f7;
  --green:#1f8a4c; --amber:#c77d00; --red:#c0392b; --ink:#1d2733; --muted:#6b7a90;
  --card:#ffffff; --line:#dce3ec;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
header{background:linear-gradient(90deg,var(--navy),var(--navy2));color:#fff;padding:16px 22px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
header .logo{width:46px;height:46px;border-radius:50%;background:var(--saffron);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;letter-spacing:.5px;flex:0 0 auto}
header h1{font-size:18px;margin:0;font-weight:600}
header .sub{font-size:12px;opacity:.85;margin-top:2px}
.wrap{max-width:1180px;margin:0 auto;padding:18px}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab{background:#fff;border:1px solid var(--line);border-bottom:3px solid transparent;padding:10px 22px;border-radius:8px 8px 0 0;cursor:pointer;font-weight:600;color:var(--muted);transition:.15s}
.tab:hover{color:var(--navy)}
.tab.active{color:var(--navy);border-bottom-color:var(--saffron);box-shadow:0 -2px 6px rgba(0,0,0,.04)}
.tab small{display:block;font-weight:400;font-size:11px;opacity:.75}
.scheme-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.scheme-head h2{margin:0;font-size:17px;color:var(--navy)}
.scheme-head .meta{font-size:12px;color:var(--muted)}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:820px){.cat-grid{grid-template-columns:1fr}}
.cat{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(20,40,80,.05)}
.cat>.cat-bar{padding:13px 16px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.cat.pp>.cat-bar{background:linear-gradient(90deg,#1f8a4c,#27a35c)}
.cat.pend>.cat-bar{background:linear-gradient(90deg,#c0392b,#d35400)}
.cat-bar .t{font-weight:700;font-size:15px}
.cat-bar .v{text-align:right;font-size:12px;line-height:1.3}
.cat-bar .v b{font-size:16px}
.sub{border-top:1px solid var(--line)}
.sub-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer;transition:.12s}
.sub-row:hover{background:#f5f8fc}
.sub-row .name{display:flex;align-items:center;gap:9px;font-weight:600}
.sub-row .name .chev{transition:.2s;color:var(--muted);font-size:11px}
.sub-row.open .name .chev{transform:rotate(90deg)}
.sub-row .nums{display:flex;gap:14px;align-items:center;font-variant-numeric:tabular-nums}
.pill{background:#eef2f7;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600;color:var(--navy)}
.pill.cr{background:#e9f5ee;color:var(--green)}
.cat.pend .pill.cr{background:#fdecea;color:var(--red)}
.zero{opacity:.45}
.agency-wrap{display:none;background:#fafcfe;border-top:1px dashed var(--line);padding:4px 0}
.agency-wrap.show{display:block}
table{width:100%;border-collapse:collapse;font-size:12.5px}
.agency-wrap table th{text-align:left;color:var(--muted);font-weight:600;padding:7px 16px;border-bottom:1px solid var(--line);background:#f0f4f9}
.agency-wrap table th.r,.agency-wrap table td.r{text-align:right}
.ag-row td{padding:8px 16px;border-bottom:1px solid #eef2f6;cursor:pointer}
.ag-row:hover td{background:#eef4fb}
.ag-name{display:flex;align-items:center;gap:7px}
.ag-name .chev{font-size:10px;color:var(--muted);transition:.2s}
.ag-row.open .ag-name .chev{transform:rotate(90deg)}
.bills{display:none}
.bills.show{display:table-row}
.bills td{padding:0 16px 10px 16px;background:#fff}
.bills table{margin:4px 0 6px 22px;width:calc(100% - 22px);border:1px solid var(--line);border-radius:6px;overflow:hidden}
.bills table th{background:#f7f9fc;font-size:11px;padding:6px 10px}
.bills table td{padding:6px 10px;border-bottom:1px solid #f0f3f7;font-size:11.5px}
.status-tag{font-size:10.5px;padding:1px 7px;border-radius:10px;background:#eef2f7;color:var(--navy)}
.empty{padding:30px 16px;text-align:center;color:var(--muted);font-size:13px}
.empty b{color:var(--navy)}
.legend{font-size:11px;color:var(--muted);margin-top:6px}
footer{max-width:1180px;margin:8px auto 30px;padding:0 18px;color:var(--muted);font-size:11px}
.search{margin:0 0 12px;display:flex;gap:8px}
.search input{flex:1;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px}


#gate{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#1b3a6b,#274d8c);display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',Roboto,Arial,sans-serif}
#gate .box{background:#fff;border-radius:14px;padding:34px 30px;width:330px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.3)}
#gate .logo{width:54px;height:54px;border-radius:50%;background:#e87722;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;margin:0 auto 14px;font-size:16px}
#gate h3{margin:0 0 4px;color:#1b3a6b;font-size:16px}
#gate p{margin:0 0 18px;color:#6b7a90;font-size:12px}
#gate input{width:100%;padding:11px 12px;border:1px solid #dce3ec;border-radius:8px;font-size:14px;text-align:center;letter-spacing:2px}
#gate button{margin-top:12px;width:100%;padding:11px;border:0;border-radius:8px;background:#1b3a6b;color:#fff;font-weight:600;font-size:14px;cursor:pointer}
#gate button:hover{background:#274d8c}
#gate .err{color:#c0392b;font-size:12px;height:16px;margin-top:8px}
body.locked{overflow:hidden}

/* ---- mobile responsiveness ---- */
html,body{max-width:100%;overflow-x:hidden}
*{word-break:break-word}
.agency-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.agency-wrap>table{min-width:320px}
.bills table{min-width:480px}
@media(max-width:640px){
  header{padding:12px 14px;gap:10px}
  header .logo{width:40px;height:40px;font-size:13px}
  header h1{font-size:14px;line-height:1.25}
  header .sub{font-size:10.5px}
  .wrap{padding:10px}
  .tabs{gap:4px}
  .tab{padding:8px 14px;font-size:13px}
  .search input{font-size:13px}
  .scheme-head h2{font-size:15px}
  .scheme-head .meta{font-size:10.5px}
  .cat-grid{gap:12px}
  .cat-bar{padding:11px 13px}
  .cat-bar .t{font-size:14px}
  .sub-row{padding:10px 12px;flex-wrap:wrap;gap:6px}
  .sub-row .name{font-size:13px}
  .sub-row .nums{gap:8px}
  .pill{font-size:11px;padding:2px 8px}
  table{font-size:11.5px}
  .agency-wrap table th,.ag-row td{padding:7px 10px}
  .bills table{margin-left:10px;width:calc(100% - 10px)}
  .legend,footer{font-size:10.5px}
}
</style>
</head>
<body>
<div id="gate"><div class="box">
  <div class="logo">NHM</div>
  <h3>Bill Pendency Dashboard</h3>
  <p>Restricted access — enter password to continue</p>
  <input id="gpw" type="password" placeholder="Password" autocomplete="off" onkeydown="if(event.key==='Enter')gateCheck()">
  <button onclick="gateCheck()">Unlock</button>
  <div class="err" id="gerr"></div>
</div></div>
<script>
document.body.classList.add('locked');
function gateCheck(){
  var v=document.getElementById('gpw').value;
  if(v==='NHM'){ document.getElementById('gate').remove(); document.body.classList.remove('locked'); }
  else { document.getElementById('gerr').textContent='Incorrect password'; document.getElementById('gpw').value=''; document.getElementById('gpw').focus(); }
}
window.addEventListener('load',function(){document.getElementById('gpw').focus();});
</script>

const cr = n => (n/1e7).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
const inr = n => Number(n).toLocaleString('en-IN',{maximumFractionDigits:0});
let current = 'RJ-671';
const tabsEl = document.getElementById('tabs');
const panel = document.getElementById('panel');

function buildTabs(){
  tabsEl.innerHTML='';
  Object.keys(SCHEMES).forEach(name=>{
    const m=SCHEMES[name].meta;
    const tot=(m['Payment Processed'].count||0)+(m['Pending Bills'].count||0);
    const b=document.createElement('div');
    b.className='tab'+(name===current?' active':'');
    b.innerHTML=`${name}<small>${tot} bills</small>`;
    b.onclick=()=>{current=name;buildTabs();render();};
    tabsEl.appendChild(b);
  });
}

function catBlock(schemeName, catKey, cls, label){
  const S=SCHEMES[schemeName];
  const order=S.order[catKey];
  const meta=S.meta[catKey];
  const data=S.data[catKey];
  let subs='';
  order.forEach((sub,i)=>{
    const node=data[sub]||{count:0,net:0,agencies:{}};
    const z=node.count===0?' zero':'';
    const id=`${schemeName}|${catKey}|${i}`;
    subs+=`<div class="sub">
      <div class="sub-row${z}" data-id="${id}" onclick="toggleSub(this)">
        <div class="name"><span class="chev">▶</span>${sub}</div>
        <div class="nums"><span class="pill">${node.count} bills</span><span class="pill cr">₹${cr(node.net)} Cr</span></div>
      </div>
      <div class="agency-wrap" data-aw="${id}"></div>
    </div>`;
  });
  return `<div class="cat ${cls}">
    <div class="cat-bar"><div class="t">${label}</div>
      <div class="v"><b>${meta.count}</b> bills<br>₹${cr(meta.net)} Cr</div></div>
    ${subs}</div>`;
}

function render(){
  const S=SCHEMES[current];
  const tot=S.meta['Payment Processed'].count+S.meta['Pending Bills'].count;
  if(tot===0){
    panel.innerHTML=`<div class="scheme-head"><h2>${current} — Bill Pendency</h2></div>
      <div class="cat-grid">
        ${catBlock(current,'Payment Processed','pp','Payment Processed')}
        ${catBlock(current,'Pending Bills','pend','Pending Bills at Various Levels')}
      </div>
      <div class="empty" style="margin-top:14px">No bill data loaded for <b>${current}</b> yet. Upload the ${current} Bill-Report Excel and it will populate using the same logic as RJ-671.</div>`;
  } else {
    const net=S.meta['Payment Processed'].net+S.meta['Pending Bills'].net;
    panel.innerHTML=`<div class="scheme-head">
        <h2>${current} — Bill Pendency</h2>
        <div class="meta">Filter: Bill Type = Grant-in-Aid · excludes Rejected / Treasury Cancelled · ${tot} bills · ₹${cr(net)} Cr gross</div>
      </div>
      <div class="cat-grid">
        ${catBlock(current,'Payment Processed','pp','Payment Processed')}
        ${catBlock(current,'Pending Bills','pend','Pending Bills at Various Levels')}
      </div>
      <div class="legend">Click any row to see the agency-wise breakup. Click an agency to list its individual bills.</div>`;
  }
  applyFilter();
}

function toggleSub(el){
  el.classList.toggle('open');
  const aw=document.querySelector(`[data-aw="${el.dataset.id}"]`);
  if(el.classList.contains('open')){
    aw.classList.add('show'); fillAgencies(el.dataset.id, aw);
  } else { aw.classList.remove('show'); }
}

function fillAgencies(id, aw){
  const [scheme,cat,idx]=id.split('|');
  const sub=SCHEMES[scheme].order[cat][idx];
  const node=SCHEMES[scheme].data[cat][sub];
  const ags=Object.entries(node.agencies||{}).sort((a,b)=>b[1].net-a[1].net);
  if(ags.length===0){ aw.innerHTML=`<div class="empty">No bills in this category.</div>`; return; }
  let rows='';
  ags.forEach(([name,v],i)=>{
    const bid=`${id}|${i}`;
    let bills='';
    v.bills.forEach(b=>{
      bills+=`<tr><td>${b.ref}</td><td>${b.bno}</td><td>${b.date}</td><td class="r">${inr(b.net)}</td><td><span class="status-tag">${b.status}</span></td></tr>`;
    });
    rows+=`<tr class="ag-row" data-ag="${bid}" onclick="toggleAg(this)"><td><div class="ag-name"><span class="chev">▶</span>${name}</div></td><td class="r">${v.count}</td><td class="r">₹${cr(v.net)} Cr</td></tr>
      <tr class="bills" data-bills="${bid}"><td colspan="3"><table><thead><tr><th>Ref No.</th><th>Bill No.</th><th>Bill Date</th><th class="r">Gross Amount (₹)</th><th>Status</th></tr></thead><tbody>${bills}</tbody></table></td></tr>`;
  });
  aw.innerHTML=`<table><thead><tr><th>Agency Name (${ags.length})</th><th class="r">Bills</th><th class="r">Gross Amount</th></tr></thead><tbody>${rows}</tbody></table>`;
  applyFilter();
}

function toggleAg(el){
  el.classList.toggle('open');
  const b=document.querySelector(`[data-bills="${el.dataset.ag}"]`);
  b.classList.toggle('show');
}

function applyFilter(){
  const q=(document.getElementById('q').value||'').toLowerCase().trim();
  document.querySelectorAll('.ag-row').forEach(r=>{
    const nm=r.querySelector('.ag-name').textContent.toLowerCase();
    const show=!q||nm.includes(q);
    r.style.display=show?'':'none';
    const b=document.querySelector(`[data-bills="${r.dataset.ag}"]`);
    if(b && !show) b.classList.remove('show'), r.classList.remove('open');
  });
}
document.getElementById('q').addEventListener('input',applyFilter);
document.getElementById('foot').textContent='Source: SNA SPARSH Bill-Report (RJ-671). Generated for NHM Rajasthan. Amounts in ₹ Crore (Gross). RJ-30 & RJ-577 follow the same structure — load their reports to populate.';
buildTabs();render();
