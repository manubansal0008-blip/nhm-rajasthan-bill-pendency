<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NHM Rajasthan — Bill Pendency Dashboard</title>
<style>
:root{--saffron:#e87722;--navy:#1b3a6b;--navy2:#274d8c;--bg:#eef2f7;--green:#1f8a4c;--red:#c0392b;--ink:#1d2733;--muted:#6b7a90;--card:#fff;--line:#dce3ec}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
header{background:linear-gradient(90deg,var(--navy),var(--navy2));color:#fff;padding:16px 22px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
header .logo{width:46px;height:46px;border-radius:50%;background:var(--saffron);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex:0 0 auto}
header h1{font-size:18px;margin:0;font-weight:600}
header .sub{font-size:12px;opacity:.85;margin-top:2px}
.wrap{max-width:1180px;margin:0 auto;padding:18px}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{background:#fff;border:1px solid var(--line);border-bottom:3px solid transparent;padding:10px 22px;border-radius:8px 8px 0 0;cursor:pointer;font-weight:600;color:var(--muted)}
.tab.active{color:var(--navy);border-bottom-color:var(--saffron)}
.tab small{display:block;font-weight:400;font-size:11px;opacity:.75}
.viewtoggle{display:inline-flex;background:#e4eaf2;border-radius:9px;padding:3px;margin-bottom:14px}
.viewtoggle button{border:0;background:transparent;padding:8px 18px;border-radius:7px;font-weight:600;color:var(--muted);cursor:pointer;font-size:13px}
.viewtoggle button.on{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.scheme-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.scheme-head h2{margin:0;font-size:17px;color:var(--navy)}
.scheme-head .meta{font-size:12px;color:var(--muted)}
.search{margin:0 0 12px}
.search input{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:13px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:820px){.cat-grid{grid-template-columns:1fr}}
.cat{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(20,40,80,.05)}
.cat>.cat-bar{padding:13px 16px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.cat.pp>.cat-bar{background:linear-gradient(90deg,#1f8a4c,#27a35c)}
.cat.pend>.cat-bar{background:linear-gradient(90deg,#c0392b,#d35400)}
.cat-bar .t{font-weight:700;font-size:15px}
.cat-bar .v{text-align:right;font-size:12px;line-height:1.3}
.cat-bar .v b{font-size:16px}
.sub{border-top:1px solid var(--line)}
.sub-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer}
.sub-row:hover{background:#f5f8fc}
.sub-row .name{display:flex;align-items:center;gap:9px;font-weight:600}
.sub-row .name .chev,.asub-row .chev,.agency-head .chev,.ag-row .chev{transition:.2s;color:var(--muted);font-size:11px}
.sub-row.open .name .chev,.asub-row.open .chev,.agency-head.open .chev,.ag-row.open .chev{transform:rotate(90deg)}
.sub-row .nums{display:flex;gap:14px;align-items:center}
.pill{background:#eef2f7;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600;color:var(--navy);white-space:nowrap}
.pill.cr{background:#e9f5ee;color:var(--green)}
.cat.pend .pill.cr{background:#fdecea;color:var(--red)}
.pill.big{font-size:12.5px;padding:3px 12px}
.zero{opacity:.45}
.agency-wrap{display:none;background:#fafcfe;border-top:1px dashed var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch}
.agency-wrap.show{display:block}
table{width:100%;border-collapse:collapse;font-size:12.5px}
.agency-wrap>table{min-width:320px}
.agency-wrap table th{text-align:left;color:var(--muted);font-weight:600;padding:7px 16px;border-bottom:1px solid var(--line);background:#f0f4f9}
.agency-wrap table th.r,.agency-wrap table td.r,td.r,th.r{text-align:right}
.ag-row td{padding:8px 16px;border-bottom:1px solid #eef2f6;cursor:pointer}
.ag-row:hover td{background:#eef4fb}
.ag-name{display:flex;align-items:center;gap:7px}
.civ-group td{padding:8px 16px;border-bottom:1px solid #eef2f6;cursor:pointer;background:#fff6ef}
.civ-group:hover td{background:#fdeede}
.civ-group .chev{transition:.2s}
.civ-group.open .chev{transform:rotate(90deg)}
.civ-group b{color:var(--saffron)}
.civ-mem{display:none}
.ag-row.civ-mem td{background:#fffdfa}
.bills{display:none}
.bills.show{display:table-row}
.bills td{padding:0 16px 10px 16px;background:#fff}
.bills table{margin:4px 0 6px 10px;width:calc(100% - 10px);border:1px solid var(--line);border-radius:6px;min-width:480px}
.bills table th{background:#f7f9fc;font-size:11px;padding:6px 10px}
.bills table td{padding:6px 10px;border-bottom:1px solid #f0f3f7;font-size:11.5px}
.status-tag{font-size:10.5px;padding:1px 7px;border-radius:10px;background:#eef2f7;color:var(--navy)}
.empty{padding:30px 16px;text-align:center;color:var(--muted);font-size:13px}
.legend{font-size:11px;color:var(--muted);margin-top:8px}
/* agency view */
.agency-list{display:flex;flex-direction:column;gap:10px}
.agency-card{background:#fff;border:1px solid var(--line);border-radius:11px;overflow:hidden;box-shadow:0 1px 3px rgba(20,40,80,.05)}
.agency-head{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer}
.agency-head:hover{background:#f5f8fc}
.agency-head .aname{font-weight:700;color:var(--navy);flex:1;font-size:13.5px}
.agency-head .ahnums{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.agency-body{display:none;padding:6px 12px 12px;background:#fafcfe;border-top:1px dashed var(--line)}
.agency-body.show{display:block}
.acat{border:1px solid var(--line);border-radius:9px;margin-top:10px;overflow:hidden}
.acat-bar{padding:9px 13px;color:#fff;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.acat-bar span{font-weight:600;font-size:12px;opacity:.95}
.acat.pp .acat-bar{background:linear-gradient(90deg,#1f8a4c,#27a35c)}
.acat.pend .acat-bar{background:linear-gradient(90deg,#c0392b,#d35400)}
.acat.rej .acat-bar{background:linear-gradient(90deg,#5d6d7e,#34495e)}
.acat.canc .acat-bar{background:linear-gradient(90deg,#7d3c98,#5b2c6f)}
.acat.zero .acat-bar{background:#aeb9c6}
.asub{border-top:1px solid #eef2f6}
.asub-row{display:flex;align-items:center;gap:8px;padding:9px 13px;cursor:pointer;background:#fff}
.asub-row:hover{background:#f3f7fc}
.asub-row .sname{flex:1;font-weight:600;font-size:12.5px}
.asub-row .snums{display:flex;gap:7px}
.abills{display:none;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#fff}
.abills.show{display:block}
.abills table{min-width:480px}
.abills th{background:#f7f9fc;font-size:10.5px;padding:6px 10px;text-align:left;color:var(--muted)}
.abills td{padding:6px 10px;border-bottom:1px solid #f0f3f7;font-size:11px}
footer{max-width:1180px;margin:8px auto 30px;padding:0 18px;color:var(--muted);font-size:11px}
.group-card{background:#fff;border:1px solid var(--saffron);border-radius:11px;overflow:hidden;box-shadow:0 1px 4px rgba(20,40,80,.06)}
.group-head{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;background:linear-gradient(90deg,#fff,#fff6ef)}
.group-head:hover{background:#fdeede}
.group-head .gname{font-weight:800;color:var(--saffron);flex:1;font-size:14.5px;letter-spacing:.3px}
.group-head .ghnums{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.group-head.open .chev{transform:rotate(90deg)}
.group-head .chev{color:var(--muted);font-size:11px;transition:.2s}
.group-body{display:none;padding:10px 12px;background:#fffaf4;border-top:1px dashed var(--saffron)}
.group-body.show{display:block}
.group-body .agency-card{margin-bottom:8px;border-color:#e6cdb4}
.iasec{border:1px solid var(--line);border-radius:9px;margin:8px 10px;overflow:hidden}
.iasec-bar{padding:9px 13px;color:#fff;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.iasec.ia .iasec-bar{background:linear-gradient(90deg,#2c5f8a,#3a78ad)}
.iasec.sna .iasec-bar{background:linear-gradient(90deg,#7d3c98,#5b2c6f)}
.iasec-bar span{font-weight:600;font-size:12px;opacity:.95}
.iasec-body{padding:8px 10px;background:#fbfdff}
.iasec-body .agency-card{margin-bottom:8px}
/* gate */
#gate{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#1b3a6b,#274d8c);display:flex;align-items:center;justify-content:center}
#gate .box{background:#fff;border-radius:14px;padding:34px 30px;width:330px;max-width:88vw;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.3)}
#gate .logo{width:54px;height:54px;border-radius:50%;background:#e87722;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;margin:0 auto 14px;font-size:16px}
#gate h3{margin:0 0 4px;color:#1b3a6b;font-size:16px}
#gate p{margin:0 0 18px;color:#6b7a90;font-size:12px}
#gate input{width:100%;padding:11px 12px;border:1px solid #dce3ec;border-radius:8px;font-size:14px;text-align:center;letter-spacing:2px}
#gate button{margin-top:12px;width:100%;padding:11px;border:0;border-radius:8px;background:#1b3a6b;color:#fff;font-weight:600;font-size:14px;cursor:pointer}
#gate .err{color:#c0392b;font-size:12px;height:16px;margin-top:8px}
body.locked{overflow:hidden}
/* mobile */
html,body{max-width:100%;overflow-x:hidden}
*{word-break:break-word}
@media(max-width:640px){
  header{padding:12px 14px;gap:10px}header .logo{width:40px;height:40px;font-size:13px}
  header h1{font-size:14px;line-height:1.25}header .sub{font-size:10.5px}
  .wrap{padding:10px}.tab{padding:8px 14px;font-size:13px}
  .scheme-head h2{font-size:15px}.scheme-head .meta{font-size:10.5px}
  .cat-bar .t{font-size:14px}.sub-row{padding:10px 12px;flex-wrap:wrap;gap:6px}
  .pill{font-size:11px;padding:2px 8px}table{font-size:11.5px}
  .agency-head .aname{font-size:12.5px}.legend,footer{font-size:10.5px}
}
.group-card.subgrp{border-color:#cdd8e6}
.group-body .group-card{margin-bottom:8px}
.iasec.oth .iasec-bar{background:linear-gradient(90deg,#7f8c8d,#616a6b)}
.group-card.subgrp{border-color:#cdd8e6}
.group-body .group-card{margin-bottom:8px}
.iasec.oth .iasec-bar{background:linear-gradient(90deg,#7f8c8d,#616a6b)}
.rollup{margin:6px 0 10px;border:1px dashed #c9d6e5;border-radius:8px;padding:4px 8px 8px;background:#f7faff}
.rollup-cap{font-size:10.5px;color:var(--muted);font-weight:700;margin:6px 2px 2px;text-transform:uppercase;letter-spacing:.5px}
.asub-row.static{cursor:default}
.asub-row.static:hover{background:#fff}
.rollup .acat{margin-top:8px}
</style>
</head>

  <p>Restricted access — enter password to continue</p>

</div>
<footer id="foot"></footer>

function sum(a){return a.reduce(function(s,b){return s+b.g;},0);}
function groupBy(arr,key){var o={};arr.forEach(function(b){var k=b[key]||'';(o[k]=o[k]||[]).push(b);});return o;}

/* ---- generic grouping ---- */
function groupNodes(bills,leaf,ctx){
  var byHead=groupBy(bills,'h');var top=[];
  Object.keys(byHead).forEach(function(h){var arr=byHead[h];
    if(h===''){var byA=groupBy(arr,'a');Object.keys(byA).forEach(function(a){top.push({t:'a',name:a,arr:byA[a]});});}
    else top.push({t:'g',name:h,arr:arr});});
  top.sort(function(x,y){return sum(y.arr)-sum(x.arr);});
  return top.map(function(n){return renderNode(n,leaf,ctx);}).join('');
}
function renderNode(node,leaf,ctx){
  if(node.t==='a')return leaf(node.name,node.arr,ctx);
  var arr=node.arr,inner='';
  if(arr.some(function(b){return b.sg;})){
    var bySg=groupBy(arr,'sg');
    Object.keys(bySg).map(function(sg){return {name:sg,arr:bySg[sg]};}).sort(function(x,y){return sum(y.arr)-sum(x.arr);}).forEach(function(sgn){
      var byA=groupBy(sgn.arr,'a');
      var ah=Object.keys(byA).map(function(a){return {name:a,arr:byA[a]};}).sort(function(x,y){return sum(y.arr)-sum(x.arr);}).map(function(an){return leaf(an.name,an.arr,ctx);}).join('');
      inner+=groupCard(sgn.name,sgn.arr,ah,ctx,true);});
  } else {
    var byA=groupBy(arr,'a');
    inner=Object.keys(byA).map(function(a){return {name:a,arr:byA[a]};}).sort(function(x,y){return sum(y.arr)-sum(x.arr);}).map(function(an){return leaf(an.name,an.arr,ctx);}).join('');
  }
  if(ctx.rollup){inner='<div class="rollup"><div class="rollup-cap">'+node.name+' &mdash; segment totals</div>'+catBreakdown(arr,ctx,false)+'</div>'+inner;}
  return groupCard(node.name,node.arr,inner,ctx,false);
}
function groupCard(name,arr,inner,ctx,isSub){var gid='gc'+(ctx.uid++);
  return '<div class="group-card'+(isSub?' subgrp':'')+'"><div class="group-head" data-t="'+gid+'" onclick="tog(this)"><span class="chev">&#9654;</span><span class="gname">'+name+'</span><span class="ghnums"><span class="pill big">'+arr.length+' bills</span><span class="pill cr big">&#8377;'+cr(sum(arr))+' Cr</span></span></div><div class="group-body" data-b="'+gid+'">'+inner+'</div></div>';}
function billsTbl(arr){var bl=arr.map(function(b){return '<tr><td>'+b.r+'</td><td>'+b.n+'</td><td>'+b.d+'</td><td class="r">'+inr(b.g)+'</td><td><span class="status-tag">'+b.s+'</span></td></tr>';}).join('');
  return '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="min-width:520px"><thead><tr><th>Ref No.</th><th>Bill No.</th><th>Date</th><th class="r">Gross (&#8377;)</th><th>Status</th></tr></thead><tbody>'+bl+'</tbody></table></div>';}
function agencyCard(name,arr,inner,ctx){var hid='ac'+(ctx.uid++);
  return '<div class="agency-card" data-name="'+(name||'').toLowerCase().replace(/"/g,'')+'"><div class="agency-head" data-t="'+hid+'" onclick="tog(this)"><span class="chev">&#9654;</span><span class="aname">'+name+'</span><span class="ahnums"><span class="pill big">'+arr.length+' bills</span><span class="pill cr big">&#8377;'+cr(sum(arr))+' Cr</span></span></div><div class="agency-body" data-b="'+hid+'">'+inner+'</div></div>';}
/* leaves */
function catBreakdown(arr,ctx,expandable){
  return CATS.filter(function(c){return c.k==='pp'||c.k==='pend';}).map(function(cat){
    var cb=arr.filter(function(b){return b.c===cat.k;});
    var subs=cat.subs.map(function(sub){var sb=cb.filter(function(b){return b.sub===sub;});if(!sb.length)return '';
      if(expandable){var bid='lc'+(ctx.uid++);
        return '<div class="asub"><div class="asub-row" data-t="'+bid+'" onclick="tog(this)"><span class="chev">&#9654;</span><span class="sname">'+sub+'</span><span class="snums"><span class="pill">'+sb.length+'</span><span class="pill cr">&#8377;'+cr(sum(sb))+' Cr</span></span></div><div class="abills" data-b="'+bid+'">'+billsTbl(sb)+'</div></div>';}
      return '<div class="asub"><div class="asub-row static"><span class="sname" style="padding-left:4px">'+sub+'</span><span class="snums"><span class="pill">'+sb.length+'</span><span class="pill cr">&#8377;'+cr(sum(sb))+' Cr</span></span></div></div>';}).join('');
    return '<div class="acat '+cat.cls+(cb.length===0?' zero':'')+'"><div class="acat-bar">'+cat.label+'<span>'+cb.length+' &bull; &#8377;'+cr(sum(cb))+' Cr</span></div>'+subs+'</div>';}).join('');
}
function leafCats(name,arr,ctx){return agencyCard(name,arr,catBreakdown(arr,ctx,true),ctx);}
function leafBills(name,arr,ctx){return agencyCard(name,arr,billsTbl(arr),ctx);}
function leafLevels(name,arr,ctx){var G=arr[0].lvlgrp;var order=LORDER[G]||[];
  var lv=order.map(function(l){var lb=arr.filter(function(b){return b.lvl===l;});if(!lb.length)return '';
    var bid='ll'+(ctx.uid++);
    return '<div class="asub"><div class="asub-row" data-t="'+bid+'" onclick="tog(this)"><span class="chev">&#9654;</span><span class="sname">'+l+'</span><span class="snums"><span class="pill">'+lb.length+'</span><span class="pill cr">&#8377;'+cr(sum(lb))+' Cr</span></span></div><div class="abills" data-b="'+bid+'">'+billsTbl(lb)+'</div></div>';}).join('');
  return agencyCard(name,arr,lv||'<div class="empty">No bills.</div>',ctx);
}

    var id=current+'|'+cat.k+'|'+si;
    return '<div class="sub"><div class="sub-row'+(sb.length===0?' zero':'')+'" data-id="'+id+'" onclick="toggleSub(this)"><div class="name"><span class="chev">&#9654;</span>'+sub+'</div><div class="nums"><span class="pill">'+sb.length+' bills</span><span class="pill cr">&#8377;'+cr(sum(sb))+' Cr</span></div></div><div class="agency-wrap" data-aw="'+id+'"></div></div>';}).join('');
  return '<div class="cat '+cat.cls+'"><div class="cat-bar"><div class="t">'+cat.label+'</div><div class="v"><b>'+cb.length+'</b> bills<br>&#8377;'+cr(sum(cb))+' Cr</div></div>'+subs+'</div>';}
function renderCat(bills){var shown=bills.filter(function(b){return b.c==='pp'||b.c==='pend';});
  if(bills.length===0){panel.innerHTML='<div class="scheme-head"><h2>'+current+' &mdash; Bill Pendency</h2></div><div class="cat-grid">'+catPanel(bills,CATS[0])+catPanel(bills,CATS[1])+'</div><div class="empty" style="margin-top:14px">No bill data loaded for <b>'+current+'</b> yet.</div>';return;}
  panel.innerHTML='<div class="scheme-head"><h2>'+current+' &mdash; Bill Pendency</h2><div class="meta">Grant-in-Aid &middot; '+shown.length+' processed/pending bills &middot; &#8377;'+cr(sum(shown))+' Cr gross</div></div><div class="cat-grid">'+catPanel(bills,CATS[0])+catPanel(bills,CATS[1])+'</div><div class="legend">Click a row for the head/agency-wise breakup; click an agency for its bills. Treasury Objected & Pending at IA and SNA expand into IA/SNA levels.</div>';}
function subInfo(id){var p=id.split('|');return {ck:p[1],sub:CATS.find(function(c){return c.k===p[1];}).subs[+p[2]]};}
function toggleSub(el){el.classList.toggle('open');var aw=document.querySelector('[data-aw="'+el.dataset.id+'"]');
  if(el.classList.contains('open')){aw.classList.add('show');var x=subInfo(el.dataset.id);
    if(x.ck==='pend'&&IASNA_SUBS.indexOf(x.sub)>=0)fillIASNA(x.sub,aw);else fillAg(x.ck,x.sub,aw);}
  else aw.classList.remove('show');}
function fillAg(ck,sub,aw){var bs=DATA[current].bills.filter(function(b){return b.c===ck&&b.sub===sub;});var ctx={uid:0};
  aw.innerHTML=bs.length?groupNodes(bs,leafBills,ctx):'<div class="empty">No bills.</div>';applyFilter();}
function fillIASNA(sub,aw){var bs=DATA[current].bills.filter(function(b){return b.c==='pend'&&b.sub===sub;});var ctx={uid:0};
  var GLAB={IA:'Pending at IA',SNA:'Pending at SNA','—':'Other / Unspecified'};var html='';
  ['IA','SNA','—'].forEach(function(G){var gb=bs.filter(function(b){return (b.lvlgrp||'—')===G;});if(!gb.length)return;
    var inner=groupNodes(gb,leafLevels,ctx);
    html+='<div class="iasec '+(G==='IA'?'ia':(G==='SNA'?'sna':'oth'))+'"><div class="iasec-bar">'+GLAB[G]+'<span>'+gb.length+' bills &bull; &#8377;'+cr(sum(gb))+' Cr</span></div><div class="iasec-body">'+inner+'</div></div>';});

/* By Agency */
function renderAgency(allbills){
  if(allbills.length===0){panel.innerHTML='<div class="scheme-head"><h2>'+current+' &mdash; Agency-wise</h2></div><div class="empty">No bill data loaded for <b>'+current+'</b> yet.</div>';return;}
  var bills=allbills.filter(function(b){return b.c==='pp'||b.c==='pend';});
  var nag=Object.keys(groupBy(bills,'a')).length;var ctx={uid:0,rollup:true};var html=groupNodes(bills,leafCats,ctx);
  panel.innerHTML='<div class="scheme-head"><h2>'+current+' &mdash; Agency-wise Details</h2><div class="meta">'+nag+' agencies &middot; '+bills.length+' processed/pending bills &middot; &#8377;'+cr(sum(bills))+' Cr gross</div></div><div class="legend" style="margin:0 0 10px">Grouped by major head; expand to agencies, then Payment Processed / Pending breakup (IA/SNA levels under Treasury Objected & Pending at IA and SNA).</div><div class="agency-list">'+html+'</div>';}
/* Search */
function renderSearch(q){var all=DATA[current].bills;
  if(!all.length){panel.innerHTML='<div class="scheme-head"><h2>'+current+' &mdash; Search</h2></div><div class="empty">No data loaded for <b>'+current+'</b>.</div>';return;}
  var hits=all.filter(function(b){return (b.r&&b.r.toLowerCase().indexOf(q)>=0)||(b.n&&b.n.toLowerCase().indexOf(q)>=0)||(b.a&&b.a.toLowerCase().indexOf(q)>=0);});
  if(!hits.length){panel.innerHTML='<div class="scheme-head"><h2>'+current+' &mdash; Search results</h2></div><div class="empty">No bills match <b>'+q+'</b>.</div>';return;}
  var by=groupBy(hits,'a');var ags=Object.keys(by).map(function(n){return {n:n,arr:by[n]};}).sort(function(a,b){return sum(b.arr)-sum(a.arr);});
  var html=ags.map(function(ag){var bl=ag.arr.map(function(b){return '<tr><td>'+b.r+'</td><td>'+b.n+'</td><td>'+b.d+'</td><td class="r">'+inr(b.g)+'</td><td><span class="status-tag">'+b.s+'</span></td></tr>';}).join('');
    return '<div class="agency-card" style="margin-bottom:8px"><div class="agency-head" style="cursor:default"><span class="aname">'+ag.n+'</span><span class="ahnums"><span class="pill big">'+ag.arr.length+' bills</span><span class="pill cr big">&#8377;'+cr(sum(ag.arr))+' Cr</span></span></div><div class="agency-body show"><div style="overflow-x:auto"><table style="min-width:520px"><thead><tr><th>Ref No.</th><th>Bill No.</th><th>Date</th><th class="r">Gross (&#8377;)</th><th>Status</th></tr></thead><tbody>'+bl+'</tbody></table></div></div></div>';}).join('');
  panel.innerHTML='<div class="scheme-head"><h2>'+current+' &mdash; Search results</h2><div class="meta">'+hits.length+' bill(s) &middot; &#8377;'+cr(sum(hits))+' Cr &middot; '+ags.length+' agency(ies) &middot; query &ldquo;'+q+'&rdquo;</div></div><div class="agency-list">'+html+'</div>';}
function applyFilter(){var q=(document.getElementById('q').value||'').toLowerCase().trim();
  document.querySelectorAll('.agency-card').forEach(function(c){c.style.display=(!q||(c.dataset.name||'').indexOf(q)>=0)?'':'none';});}
function render(){var bills=DATA[current].bills;if(view==='cat')renderCat(bills);else renderAgency(bills);applyFilter();}
document.getElementById('q').addEventListener('input',function(){var q=this.value.trim();if(q==='')render();else renderSearch(q.toLowerCase());});
document.getElementById('foot').textContent='Source: SNA SPARSH Bill-Reports, data as on 24 Apr 2026. Amounts in ₹ Crore (Gross). Scope: Grant-in-Aid bills. RJ-30 follows the same structure — load its report to populate.';
buildTabs();render();
</script>
</body>
</html>
